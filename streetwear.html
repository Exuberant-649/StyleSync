  <script>
    function loadSaved() {
      return JSON.parse(localStorage.getItem("savedStyles")) || [];
    }

    function saveToLocal(data) {
      localStorage.setItem("savedStyles", JSON.stringify(data));
    }

    function isSaved(img) {
      let saved = loadSaved();
      return saved.some(item => item.img === img);
    }

    $(document).ready(function(){
      $(".style-card").each(function(){
        let img = $(this).find("img").attr("src");
        let btn = $(this).find(".save-btn");
        if(isSaved(img)){
          btn.text("❤️").removeClass("unsaved").addClass("saved");
        }
      });

      $(".save-btn").click(function(){
        let btn = $(this);
        let card = btn.closest(".style-card");
        let styleName = btn.data("name");
        let styleImg = card.find("img").attr("src");
        let saved = loadSaved();

        if(btn.hasClass("unsaved")) {
          saved.push({name: styleName, img: styleImg});
          saveToLocal(saved);
          btn.text("❤️").removeClass("unsaved").addClass("saved");
        } else {
          saved = saved.filter(item => item.img !== styleImg);
          saveToLocal(saved);
          btn.text("🤍").removeClass("saved").addClass("unsaved");
        }
      });
    });
  </script>
