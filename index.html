  <script>
    function updateHearts() {
      let saved = JSON.parse(localStorage.getItem("savedStyles")) || [];
      $(".save-btn").each(function(){
        let styleName = $(this).data("name");
        let isSaved = saved.find(item => item.name === styleName);
        $(this).text(isSaved ? "❤️" : "🤍");
      });
    }

    $(document).ready(function(){
      updateHearts();

      $(".save-btn").click(function(e){
        e.preventDefault();
        let styleName = $(this).data("name");
        let styleImg = $(this).data("img");

        let saved = JSON.parse(localStorage.getItem("savedStyles")) || [];

        let index = saved.findIndex(item => item.name === styleName);
        if(index > -1){
          saved.splice(index, 1); // remove
        } else {
          saved.push({name: styleName, img: styleImg}); // add
        }

        localStorage.setItem("savedStyles", JSON.stringify(saved));
        updateHearts(); // refresh hearts
      });
    });
  </script>
  <script>
  document.addEventListener("DOMContentLoaded", () => {
    if (localStorage.theme === "dark") {
      document.body.classList.add("dark");
      document.getElementById("theme-toggle").textContent = "☀️";
    }
    document.getElementById("theme-toggle").onclick = () => {
      const dark = document.body.classList.toggle("dark");
      localStorage.theme = dark ? "dark" : "light";
      document.getElementById("theme-toggle").textContent = dark ? "☀️" : "🌙";
    };
  });
</script>
<script>
  document.getElementById("searchBar").addEventListener("keyup", function() {
    let value = this.value.toLowerCase();
    let cards = document.querySelectorAll(".style-card");
    
    cards.forEach(card => {
      let name = card.querySelector("img").alt.toLowerCase();
      if (name.includes(value)) {
        card.style.display = "block";
      } else {
        card.style.display = "none";
      }
    });
  });
</script>
